<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>花卉</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="header" class="header">
        <h1>花卉大全</h1>
    </div>

    <div id="content" class="content">
        <div class="floor">
            <img src="images/1.png" alt="向日葵">
            <p class="flower-intro"><a href="flower-intro/向日葵.html" target="_self">向日葵</a>：喜光草本花卉，花盘随光照转动</p>

        </div>
        <div class="floor">
            <img src="images/2.jpeg" alt="梅花">
            <p class="flower-intro"><a href="flower-intro/梅花.html" target="_self">梅花</a>：耐寒冬花，象征坚韧品格</p>

        </div>
        <div class="floor">
            <img src="images/3.jpg" alt="玫瑰">
            <p class="flower-intro"><a href="flower-intro/玫瑰.html" target="_self">玫瑰</a>：经典观赏花卉，常用于表达爱意</p>

        </div>
        <div class="floor">
            <img src="images/4.jpeg" alt="荷花">
            <p class="flower-intro"><a href="flower-intro/荷花.html" target="_self">荷花</a>：水生花卉，寓意高洁清廉</p>

        </div>
        <div class="floor">
            <img src="images/5.jpeg" alt="海棠">
            <p class="flower-intro"><a href="flower-intro/海棠.html" target="_self">海棠</a>：春日名花，花色柔美艳丽</p>

        </div>
    </div>
    <br>
   <label for="flower">你最喜欢的花是哪个：</label>
    <select id="flower" name="flower" class="flower-select">
    <option value="sunflower" class="opt-sun">向日葵</option>
    <option value="plum" class="opt-plum">梅花</option>
    <option value="rose" class="opt-rose">玫瑰</option>
    <option value="lotus" class="opt-lotus">荷花</option>
    <option value="begonia" class="opt-haitang">海棠</option>
    </select>
    <br>


</body>
</html>
